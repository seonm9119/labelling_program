services:
  labeling_program:
    build: .
    image: labelling_program:latest
    container_name: labeling_program
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      # 코드 변경 시 바로 반영
      - ./app.py:/app/app.py:ro
      - ./config.py:/app/config.py:ro
      - ./responses.py:/app/responses.py:ro
      - ./models:/app/models:ro
      - ./routes:/app/routes:ro
      - ./utils:/app/utils:ro
      # CLIP 모델 캐시
      - ~/.cache/clip:/root/.cache/clip
      # 호스트 파일시스템 마운트
      - /home:/home
      - /mnt:/mnt
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - APP_DEBUG=1
      - APP_PORT=5001
      - DEFAULT_DATA_PATH=/
      - PADDLE_OCR_API_URL=http://paddle-ocr:8001/inference
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - model-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

networks:
  model-network:
    external: true

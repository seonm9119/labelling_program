services:
  labeling_program:
    build: .
    image: labelling_program:latest
    container_name: labeling_program
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      # 코드 변경 시 바로 반영
      - ./app.py:/app/app.py:ro
      - ./config.py:/app/config.py:ro
      - ./responses.py:/app/responses.py:ro
      - ./models:/app/models:ro
      - ./routes:/app/routes:ro
      - ./utils:/app/utils:ro
      # Host filesystem mounts
      - /home:/home
      - /mnt/h:/mnt/h:rw,rslave
    environment:
      - APP_DEBUG=1
      - APP_PORT=5001
      - DEFAULT_DATA_PATH=/
      - PADDLE_OCR_API_URL=http://paddle-ocr:8001/inference
      - PADDLE_OCR_RELEASE_URL=http://paddle-ocr:8001/release
      - DEEPSEEK_OCR_API_URL=http://deepseek-ocr:8002/inference
      - DEEPSEEK_OCR_RELEASE_URL=http://deepseek-ocr:8002/release
      - DEEPSEEK_OCR_API_TIMEOUT=600
      - DEEPSEEK_OCR_BASE_SIZE=1024
      - DEEPSEEK_OCR_IMAGE_SIZE=768
      - DEEPSEEK_OCR_CROP_MODE=true
      - DEEPSEEK_OCR_MAX_NEW_TOKENS=8192
      - DEEPSEEK_OCR_USE_CACHE=true
      - SERVER_FOLDER_ROOT=/mnt/h
      - SERVER_BULK_OUTPUT_ROOT=/mnt/h
      - "OCR_NOTIFY_EMAIL_ENABLED=${OCR_NOTIFY_EMAIL_ENABLED:-1}"
      - "OCR_NOTIFY_EMAIL_TO=${OCR_NOTIFY_EMAIL_TO:-seonm9119@gmail.com}"
      - "OCR_NOTIFY_EMAIL_SUBJECT_PREFIX=${OCR_NOTIFY_EMAIL_SUBJECT_PREFIX:-[Paddle OCR]}"
      - "OCR_NOTIFY_EMAIL_AUTH_MODE=${OCR_NOTIFY_EMAIL_AUTH_MODE:-smtp}"
      - "SMTP_NOTIFY_EMAIL_HOST=${SMTP_NOTIFY_EMAIL_HOST:-smtp.gmail.com}"
      - "SMTP_NOTIFY_EMAIL_PORT=${SMTP_NOTIFY_EMAIL_PORT:-587}"
      - "SMTP_NOTIFY_EMAIL_USERNAME=${SMTP_NOTIFY_EMAIL_USERNAME:-}"
      - "SMTP_NOTIFY_EMAIL_PASSWORD=${SMTP_NOTIFY_EMAIL_PASSWORD:-}"
      - "SMTP_NOTIFY_EMAIL_FROM=${SMTP_NOTIFY_EMAIL_FROM:-}"
      - "SMTP_NOTIFY_EMAIL_USE_TLS=${SMTP_NOTIFY_EMAIL_USE_TLS:-1}"
      - "SMTP_NOTIFY_EMAIL_TIMEOUT=${SMTP_NOTIFY_EMAIL_TIMEOUT:-20}"
      - "GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}"
      - "GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}"
      - "GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI:-}"
      - "GOOGLE_EMAIL_TOKEN_PATH=${GOOGLE_EMAIL_TOKEN_PATH:-/home/nami/repo/labelling_program/.secrets/google_email_token.json}"
      - "GOOGLE_EMAIL_STATE_PATH=${GOOGLE_EMAIL_STATE_PATH:-/home/nami/repo/labelling_program/.secrets/google_email_state.json}"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - model-network
    restart: unless-stopped

networks:
  model-network:
    external: true
